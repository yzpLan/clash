ruleset=🐟 漏网之鱼,[]FINAL

; --- 2. 策略组设置 ---

; 主选择组 
custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]📌 手动切换`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇺🇲 美国节点`[]🇸🇬 狮城节点`[]🇨🇳 台湾节点`[]🇰🇷 韩国节点`[]DIRECT

; 全局节点池 
custom_proxy_group=📌 手动切换`select`.*
custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50

; 业务分流组
custom_proxy_group=🎬 EMBY影院`select`[]🚀 节点选择`[]📌 手动切换`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇺🇲 美国节点`[]🇸🇬 狮城节点`[]🇨🇳 台湾节点`[]🇰🇷 韩国节点`[]DIRECT
